# YouTube Shorts Studio — configuration.
# Copy to studio.yaml and edit. Every key is optional; these are the defaults.
# Env vars override: STUDIO_<KEY>, e.g. STUDIO_OLLAMA_MODEL=qwen2.5:7b

# --- server / access ---------------------------------------------------------
workspace: "./workspace"
host: "0.0.0.0"
port: 8765
# CHANGE THIS. The tunnel makes the app reachable from the public internet;
# this password is the gate.
app_password: "change-me"
cookie_secure: false
login_max_attempts: 20         # failed logins in 5 min before a 1-min lockout
max_upload_mb: 2048            # reject video uploads larger than this

# --- remote access (open the app on your phone) -------------------------------
# quick = free ephemeral trycloudflare.com URL (changes each run)
# named = stable URL via a Cloudflare tunnel token | off = local only
cloudflare_mode: "quick"
cloudflare_token: ""
cloudflared_bin: "cloudflared"

# --- local AI ------------------------------------------------------------------
ollama_url: "http://localhost:11434"
# "auto" picks the most capable installed model THAT FITS the GPU (~<=6 GB
# weights). Pin one for consistency, e.g. "qwen2.5:7b".
ollama_model: "auto"
ollama_enabled: true
ollama_think: false
ollama_timeout: 240
# Language for titles/descriptions: "auto" follows the video's language.
metadata_language: "auto"
# ollama | openai | anthropic | gemini (cloud keys are stored encrypted via the UI)
llm_provider: "ollama"
llm_model: ""

# --- transcription -------------------------------------------------------------
whisper_model: "large-v3"     # tiny|base|small|medium|large-v3
whisper_device: "auto"        # auto|cpu|cuda
whisper_enabled: true
whisper_language: "ar"        # pin for much better accuracy than auto

# --- short selection -------------------------------------------------------------
target_short_seconds: 55
min_short_seconds: 50
max_short_seconds: 60
keep_whole_if_under_seconds: 90
# Never start a short before this many seconds / this fraction of the runtime
# (whichever is larger) — skips intros and greetings.
intro_skip_seconds: 45
intro_skip_frac: 0.05
# MAXIMUM shorts per video. Fewer are produced when fewer strong segments exist.
shorts_per_video: 3

# --- semantic segmentation --------------------------------------------------------
# Ask SponsorBlock (crowd-sourced) which parts are sponsor/intro/outro.
sponsorblock_enabled: true
segment_window_sentences: 32
segment_overlap_sentences: 8

# --- montage (silence cutting) ------------------------------------------------------
silence_cut_enabled: true
silence_min_gap: 0.45         # gaps longer than this are removed...
silence_pad: 0.12             # ...keeping this much air around speech
montage_zoom: true            # subtle punch-in alternating between jump cuts
montage_zoom_factor: 1.06

# --- subscribe reminder (burned into every short) --------------------------------------
subscribe_overlay_enabled: true
subscribe_at_frac: 0.4        # appears at 40% of the short
subscribe_duration: 3.0
subscribe_sound: true         # soft bell ding
subscribe_text: "اشترك"
subscribed_text: "تم الاشتراك"

# --- thumbnails ------------------------------------------------------------------------
thumbs_enabled: true
thumb_template: "auto"        # auto | blur | burst | flat
thumb_use_gpu: false          # keep the 8 GB card free; CPU takes seconds

# --- downloading -------------------------------------------------------------------------
download_prefer_mp4: true
download_host_allowlist: ["youtube.com", "youtu.be"]

# --- rendering ------------------------------------------------------------------------------
reframe_mode: "auto"          # or force: crop_blur | blur_background | face_focus | ...
captions_enabled: true
caption_font: "Arial"
caption_fontsize: 96
caption_highlight: "#FFE000"
caption_base_color: "#FFFFFF"
caption_position: "lower"
caption_max_words: 4

# --- uploading to YouTube ---------------------------------------------------------------------
one_per_day: false            # the 2026 API quota allows ~100 uploads/day
move_uploaded_on_success: true
# Bake the thumbnail in as the first ~0.1s — the only Shorts-thumbnail
# mechanism that works on every account (the API thumbnail is also attempted).
embed_thumb_first_frame: true
youtube_client_secret: "./secrets/youtube_client_secret.json"
youtube_token: "./secrets/youtube_token.json"
youtube_privacy: "public"     # default; overridable per short in the UI
youtube_category_id: "22"

# --- misc ---------------------------------------------------------------------------------------
media_library: ""             # "" = workspace/downloads
vault_db: "./secrets/vault.db"
vault_recovery_password: ""
