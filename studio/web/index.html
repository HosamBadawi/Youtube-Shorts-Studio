<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d12" />
  <title>Daily Shorts Studio</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>🎬 Daily Shorts</h1>
    <div id="statusbar" class="statusbar"></div>
  </header>

  <main>
    <!-- LOGIN -->
    <section id="login" class="card hidden">
      <h2>Sign in</h2>
      <input id="password" type="password" placeholder="App password" autocomplete="current-password" />
      <button id="loginBtn" class="primary">Unlock</button>
      <p id="loginErr" class="err"></p>
    </section>

    <!-- SOURCE -->
    <section id="source" class="card hidden">
      <h2>New shorts</h2>
      <div class="tabs">
        <button class="tab active" data-tab="upload">📤 Upload</button>
        <button class="tab" data-tab="url">▶️ YouTube</button>
        <button class="tab" data-tab="local">💾 On PC</button>
      </div>

      <div class="tabpane" data-pane="upload">
        <label class="filepick" id="filepick">
          <input id="file" type="file" accept="video/*" />
          <span id="fileLabel">Tap to choose a long video</span>
        </label>
      </div>

      <div class="tabpane hidden" data-pane="url">
        <label class="field">YouTube URL
          <input id="url" type="text" inputmode="url" placeholder="https://youtube.com/watch?v=…" />
        </label>
      </div>

      <div class="tabpane hidden" data-pane="local">
        <p class="hint" id="libDir"></p>
        <select id="localPick" size="6" class="picklist"></select>
        <button id="refreshLib" class="ghost">↻ Refresh list</button>
      </div>

      <div class="row2">
        <label class="field">How many shorts?
          <input id="count" type="number" min="1" max="20" value="3" />
        </label>
        <label class="field">Niche / topic
          <input id="niche" type="text" placeholder="e.g. geopolitics" />
        </label>
      </div>

      <button id="genBtn" class="primary">✂️ Generate shorts</button>
      <p id="genErr" class="err"></p>
    </section>

    <!-- GENERATING -->
    <section id="generating" class="card hidden">
      <h2>Working…</h2>
      <div class="spinner"></div>
      <p id="genStage" class="stage">starting…</p>
      <p class="hint">Shorts appear below as they finish — you can start reviewing them.</p>
    </section>

    <!-- SHORTS -->
    <section id="shorts" class="hidden">
      <div class="shortsbar">
        <h2 id="shortsTitle">Your shorts</h2>
        <button id="newBatch" class="ghost small">+ New</button>
      </div>
      <div id="shortList"></div>
    </section>
  </main>

  <footer>self-hosted on your PC · reachable via Cloudflare</footer>
  <script src="/static/app.js"></script>
</body>
</html>
